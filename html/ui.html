<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <div id="onx-speedo" style="display: none;">
        
        <!-- SECCIÓN SUPERIOR PRINCIPAL -->
        <div class="top-layout">
            
            <!-- Bloque 1: Velocidad y Marcha -->
            <div class="left-panel">
                <div id="speed">000</div>
                <div class="gear-container">
                    <div class="gear-box"><span id="gear">N</span></div>
                    <div class="unit">KM/H</div>
                </div>
            </div>

            <!-- Bloque 2: Iconos de Estado Verticales (Centro) -->
            <div class="center-status-icons">
                <div class="icons-mini-row">
                    <span id="icon-lock" class="mid-icon">🔓</span>
                    <span id="icon-seatbelt" class="mid-icon text-off blink-active">✕</span>
                </div>
                <div class="icons-mini-row">
                    <span id="icon-lights" class="mid-icon">💡</span>
                    <span id="icon-cruise" class="mid-icon">⏱️</span> <!-- Nuevo icono de control de crucero -->
                </div>
            </div>

            <!-- Bloque 3: Barras de Estado Verticales Gemelas (Derecha) -->
            <div class="bars-panel-right">
                <!-- Motor -->
                <div class="status-vertical">
                    <span class="status-label">H</span>
                    <div class="status-bars-container">
                        <div class="eng-bar" id="eb-6"></div>
                        <div class="eng-bar" id="eb-5"></div>
                        <div class="eng-bar" id="eb-4"></div>
                        <div class="eng-bar" id="eb-3"></div>
                        <div class="eng-bar" id="eb-2"></div>
                        <div class="eng-bar" id="eb-1"></div>
                    </div>
                    <span class="status-label">🔧</span>
                </div>
                <!-- Gasolina -->
                <div class="status-vertical">
                    <span class="status-label">F</span>
                    <div class="status-bars-container">
                        <div class="f-bar" id="fb-6"></div>
                        <div class="f-bar" id="fb-5"></div>
                        <div class="f-bar" id="fb-4"></div>
                        <div class="f-bar" id="fb-3"></div>
                        <div class="f-bar" id="fb-2"></div>
                        <div class="f-bar" id="fb-1"></div>
                    </div>
                    <span class="status-label">E</span>
                </div>
            </div>

        </div>

        <!-- SECCIÓN INFERIOR: Barra de RPM gruesa y nombre del coche -->
        <div class="bottom-layout">
            <div class="rpm-heavy-bar">
                <div class="rpm-block" id="rpm-1"></div><div class="rpm-block" id="rpm-2"></div>
                <div class="rpm-block" id="rpm-3"></div><div class="rpm-block" id="rpm-4"></div>
                <div class="rpm-block" id="rpm-5"></div><div class="rpm-block" id="rpm-6"></div>
                <div class="rpm-block" id="rpm-7"></div><div class="rpm-block" id="rpm-8"></div>
                <div class="rpm-block" id="rpm-9"></div><div class="rpm-block" id="rpm-10"></div>
                <div class="rpm-block" id="rpm-11"></div><div class="rpm-block" id="rpm-12"></div>
                <div class="rpm-block" id="rpm-13"></div><div class="rpm-block" id="rpm-14"></div>
                <div class="rpm-block" id="rpm-15"></div><div class="rpm-block" id="rpm-16"></div>
                <div class="rpm-block" id="rpm-17"></div><div class="rpm-block" id="rpm-18"></div>
                <div class="rpm-block" id="rpm-19"></div><div class="rpm-block" id="rpm-20"></div>
            </div>
            
            <div id="vehicle-container">
                <span class="vehicle-key-icon">🔑</span>
                <span id="vehicle-name">Cargando...</span>
            </div>
        </div>

    </div>
    <script src="ui.js"></script>
</body>
</html>
